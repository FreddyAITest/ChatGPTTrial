<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Opening App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="login-container" class="modal">
        <form id="login-form" class="modal-content">
            <h2>Anmelden</h2>
            <label for="username">Benutzername</label>
            <input type="text" id="username" required>
            <label for="password">Passwort</label>
            <input type="password" id="password" required>
            <button type="submit">Einloggen</button>
        </form>
    </div>

    <header>
        <h1 id="date"></h1>
        <div id="events"></div>
    </header>

    <main>
        <section id="map-section">
            <iframe
                id="map-frame"
                src=""
                width="100%"
                height="300"
                loading="lazy"
                allowfullscreen>
            </iframe>
        </section>

        <section id="todos-section">
            <h2>ToDos</h2>
            <ul id="todo-list"></ul>
            <form id="todo-form">
                <input type="text" id="todo-input" placeholder="Neues ToDo" required>
                <button type="submit">Hinzufügen</button>
            </form>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
